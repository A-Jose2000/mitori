<svg width="920" height="260" viewBox="0 0 920 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mitori</title>
  <desc id="desc">Mitori logo showing a PostgreSQL database, connected table cards, and the Mitori wordmark.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="920" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101418"/>
      <stop offset="0.58" stop-color="#111D22"/>
      <stop offset="1" stop-color="#171A24"/>
    </linearGradient>
    <linearGradient id="cyan" x1="104" y1="58" x2="268" y2="196" gradientUnits="userSpaceOnUse">
